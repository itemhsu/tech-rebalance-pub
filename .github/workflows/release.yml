name: Release engine wheel

# 兩 repo 架構：在 v* tag 發佈時建 wheel 並附到 GitHub Release。
# Repo B 可用 git+ 安裝（pip install tech-rebalance@<tag>）或下載此 wheel。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
      - name: Verify wheel bundles assets
        run: |
          python - <<'PY'
          import glob, zipfile
          w = sorted(glob.glob("dist/*.whl"))[-1]
          n = zipfile.ZipFile(w).namelist()
          assert any(x.startswith("strategies/") and x.endswith(".json") for x in n), "wheel 缺 strategies"
          assert any(x.startswith("schemas/") and x.endswith(".json") for x in n), "wheel 缺 schemas"
          assert any(x.startswith("brokers/") and x.endswith(".json") for x in n), "wheel 缺 brokers"
          assert "data/universe.json" in n, "wheel 缺 data/universe.json"
          assert "data/shares_outstanding.json" in n, "wheel 缺 data/shares_outstanding.json"
          print("✅ wheel 含 strategies/schemas/brokers 資產")
          PY
      - name: Generate manifest.json (GUI 策略/券商來源)
        run: |
          python scripts/gen_manifest.py dist/manifest.json
          cat dist/manifest.json
      - name: Attach to Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
