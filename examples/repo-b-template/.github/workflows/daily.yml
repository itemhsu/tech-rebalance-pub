name: Daily Rebalance
on:
  schedule:
    - cron: "15 21 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install engine
        run: pip install "tech-rebalance @ git+https://github.com/itemhsu/tech-rebalance-pub@v1.0.22"
      - name: Run all accounts
        env:
          ALPACA_API_KEY: ${{ secrets.ACC1_ALPACA_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ACC1_ALPACA_SECRET }}
        run: TR_WORKDIR="${{ github.workspace }}" run-account --account all
      - name: Commit data back to this repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "data: daily rebalance" || echo "no changes"
          git push
