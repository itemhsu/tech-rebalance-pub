name: Daily rebalance — 台股 (TW)
on:
  # 台股 13:30 收盤（Asia/Taipei = UTC+8）= 05:30 UTC；收盤後約 30 分跑。
  # UTC 06:00 = 台灣 14:00，週一至週五。預設開啟——自動。
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run: { description: 'dry-run（不下單）', type: boolean, default: true }
      force:   { description: '強制再平衡（覆蓋頻率守門）', type: boolean, default: false }
permissions:
  contents: write
jobs:
  daily-tw:
    runs-on: ubuntu-latest
    env:
      TR_WORKDIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install engine (public repo, no token)
        run: pip install "tech-rebalance @ git+https://github.com/itemhsu/tech-rebalance-pub@{version}"
      - name: Install SinoPac SDK (台股下單)
        run: pip install shioaji
      - name: Run TW accounts
        env:
          # 永豐(SinoPac) 金鑰：ACC{id}_API_KEY / ACC{id}_API_SECRET（依 spec.auth.required_env）
          ACC1_API_KEY:    ${{ secrets.ACC1_API_KEY }}
          ACC1_API_SECRET: ${{ secrets.ACC1_API_SECRET }}
          ACC2_API_KEY:    ${{ secrets.ACC2_API_KEY }}
          ACC2_API_SECRET: ${{ secrets.ACC2_API_SECRET }}
          ACC3_API_KEY:    ${{ secrets.ACC3_API_KEY }}
          ACC3_API_SECRET: ${{ secrets.ACC3_API_SECRET }}
          ACC4_API_KEY:    ${{ secrets.ACC4_API_KEY }}
          ACC4_API_SECRET: ${{ secrets.ACC4_API_SECRET }}
          ACC5_API_KEY:    ${{ secrets.ACC5_API_KEY }}
          ACC5_API_SECRET: ${{ secrets.ACC5_API_SECRET }}
          ACC6_API_KEY:    ${{ secrets.ACC6_API_KEY }}
          ACC6_API_SECRET: ${{ secrets.ACC6_API_SECRET }}
          ACC7_API_KEY:    ${{ secrets.ACC7_API_KEY }}
          ACC7_API_SECRET: ${{ secrets.ACC7_API_SECRET }}
          ACC8_API_KEY:    ${{ secrets.ACC8_API_KEY }}
          ACC8_API_SECRET: ${{ secrets.ACC8_API_SECRET }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}
          PAGES_TOKEN:        ${{ secrets.PAGES_TOKEN }}
          FORCE_REBALANCE:    ${{ inputs.force }}
        run: |
          # --market tw：只跑台股帳戶（依券商 spec.market.currency=TWD 判定）。
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            run-account --account all --market tw --dry-run
          else
            run-account --account all --market tw
          fi
      - name: Commit data
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "Daily TW Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && exit 0
          git commit -m "chore(daily-tw): $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash -X theirs origin main
          git push

      - name: Publish dashboard data
        if: ${{ inputs.dry_run != true }}
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: tr-publish-dashboard
