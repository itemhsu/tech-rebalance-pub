name: Test Email
# 手動觸發：用已存的 EMAIL_PASSWORD secret 寄一封測試信給寄件人自己。
# GUI 觸發此 workflow 後讀 run 結果顯示「正常/失敗」，使用者不必再輸入密碼。
# 自包含（只用 Python stdlib SMTP），不需安裝引擎，快又穩。
on:
  workflow_dispatch:
jobs:
  test-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Send test email (to self)
        env:
          EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python - <<'PY'
          import os, ssl, smtplib, sys
          from email.mime.text import MIMEText
          sender = (os.environ.get("EMAIL_SENDER") or "").strip()
          pw     = (os.environ.get("EMAIL_PASSWORD") or "").strip()
          if not sender or not pw:
              print("FAIL: missing EMAIL_SENDER or EMAIL_PASSWORD"); sys.exit(1)
          # 內文 utf-8（MIMEText 會 base64 編碼）；Subject 用 ASCII 避免 header 編碼問題；
          # 用 send_message（正確處理 bytes），不用 as_string()+sendmail（會對非 ASCII 失敗）。
          msg = MIMEText("This is a test email. Your EMAIL_PASSWORD works. 測試信。",
                         "plain", "utf-8")
          msg["Subject"] = "Tech-Rebalance test email"
          msg["From"] = sender
          msg["To"] = sender
          try:
              with smtplib.SMTP("smtp.gmail.com", 587, timeout=30) as s:
                  s.starttls(context=ssl.create_default_context())
                  s.login(sender, pw)
                  s.send_message(msg)
              print("OK: test email sent to", sender); sys.exit(0)
          except smtplib.SMTPAuthenticationError as e:
              print("FAIL auth (use Gmail App Password, not normal password):", e); sys.exit(1)
          except Exception as e:
              print("FAIL:", type(e).__name__, e); sys.exit(1)
          PY
